<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>diff — ashref.tn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">⚡ diff<span class="accent">.ashref.tn</span></div>
    <div class="actions">
      <label class="opt"><input type="checkbox" id="ignoreWS" /> Ignore WS</label>
      <button id="swapBtn" title="Swap (Ctrl+S)">⇄</button>
      <button id="clearBtn" title="Clear (Ctrl+X)">✕</button>
    </div>
  </header>

  <main>
    <div class="panel">
      <div class="panel-head">
        <span>Original</span>
        <label class="file-btn">📎<input type="file" id="fileLeft" /></label>
      </div>
      <div class="editor-wrap" id="wrapLeft">
        <textarea id="textLeft" spellcheck="false" placeholder="Paste or drop file…"></textarea>
        <div class="overlay" id="overlayLeft"></div>
      </div>
    </div>

    <div class="gutter"></div>

    <div class="panel">
      <div class="panel-head">
        <span>Modified</span>
        <label class="file-btn">📎<input type="file" id="fileRight" /></label>
      </div>
      <div class="editor-wrap" id="wrapRight">
        <textarea id="textRight" spellcheck="false" placeholder="Paste or drop file…"></textarea>
        <div class="overlay" id="overlayRight"></div>
      </div>
    </div>
  </main>

  <footer id="stats"></footer>

  <script src="diff_match_patch.js"></script>
  <script src="app.js"></script>
</body>
</html>
