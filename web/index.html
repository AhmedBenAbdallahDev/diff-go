<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diff-ashref-tn</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Floating Navigation Bar -->
  <nav class="navbar">
    <div class="nav-brand">⇋ diff-ashref-tn</div>
    <div class="nav-modes">
      <button class="mode-btn active" data-mode="text">📝 Text</button>
      <button class="mode-btn" data-mode="file">📁 Files</button>
      <button class="mode-btn" data-mode="folder">📂 Folders</button>
    </div>
    <div class="nav-actions">
      <button class="action-btn" id="btn-clear">Clear</button>
      <button class="action-btn" id="btn-swap">⇄ Swap</button>
    </div>
  </nav>

  <!-- File/Folder Input Bar (shown when needed) -->
  <div id="input-bar" class="input-bar" hidden>
    <div class="input-bar-content" id="file-inputs" hidden>
      <div class="file-picker">
        <label>Left File:</label>
        <input type="file" id="file-left">
        <span class="file-name" id="file-left-name">No file selected</span>
      </div>
      <div class="file-picker">
        <label>Right File:</label>
        <input type="file" id="file-right">
        <span class="file-name" id="file-right-name">No file selected</span>
      </div>
      <button class="load-btn" id="btn-load-files">Load Files</button>
    </div>
    <div class="input-bar-content" id="folder-inputs" hidden>
      <div class="folder-picker">
        <label>Left Folder:</label>
        <input type="text" id="folder-left" placeholder="C:\path\to\folder">
      </div>
      <div class="folder-picker">
        <label>Right Folder:</label>
        <input type="text" id="folder-right" placeholder="C:\path\to\folder">
      </div>
      <button class="load-btn" id="btn-compare-folders">Compare</button>
    </div>
  </div>

  <!-- Main Diff View - Always Visible -->
  <main class="diff-main">
    <!-- Left Panel -->
    <div class="diff-panel">
      <div class="panel-header">
        <span class="panel-title">Original</span>
        <span class="panel-stats" id="left-stats">0 lines</span>
      </div>
      <div class="panel-body">
        <div class="line-numbers" id="left-line-nums"></div>
        <div class="editor-container">
          <textarea id="text-left" class="editor" placeholder="Paste or type original text here..." spellcheck="false"></textarea>
          <div id="overlay-left" class="diff-overlay"></div>
        </div>
      </div>
    </div>

    <!-- Center Divider -->
    <div class="diff-divider"></div>

    <!-- Right Panel -->
    <div class="diff-panel">
      <div class="panel-header">
        <span class="panel-title">Modified</span>
        <span class="panel-stats" id="right-stats">0 lines</span>
      </div>
      <div class="panel-body">
        <div class="line-numbers" id="right-line-nums"></div>
        <div class="editor-container">
          <textarea id="text-right" class="editor" placeholder="Paste or type modified text here..." spellcheck="false"></textarea>
          <div id="overlay-right" class="diff-overlay"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Stats Footer -->
  <footer class="stats-footer">
    <span class="stat stat-add" id="stat-add">+0 added</span>
    <span class="stat stat-del" id="stat-del">−0 removed</span>
    <span class="stat stat-same" id="stat-same">0 unchanged</span>
  </footer>

  <!-- Folder Results Modal -->
  <div id="folder-modal" class="modal" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Folder Comparison</h2>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <div class="modal-stats" id="modal-stats"></div>
      <div class="modal-body">
        <table class="folder-table">
          <thead>
            <tr><th>Status</th><th>Name</th><th>Type</th><th>Size</th></tr>
          </thead>
          <tbody id="folder-results"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>window.__TOKEN__="{{TOKEN}}";</script>
  <script src="js/app.js"></script>
</body>
</html>
